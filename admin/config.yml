backend:
  name: github
  repo: ebaykatherinetran-ops/datmuiecofarm
  branch: main
  base_url: https://sveltia-cms-auth.ebaykatherinetran.workers.dev

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "vi"

collections:
  # ─── BLOG ───
  - name: "blog"
    label: "📝 Blog & Tin tức"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Tiêu đề bài viết", name: "title", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Ảnh đại diện", name: "featured_image", widget: "image", required: false, hint: "Khuyến nghị 800x450px" }
      - { label: "Mô tả ngắn", name: "summary", widget: "text", hint: "Tối đa 160 ký tự" }
      - { label: "Nội dung bài viết", name: "body", widget: "markdown" }
      - label: "SEO"
        name: "seo"
        widget: "object"
        collapsed: true
        fields:
          - { label: "SEO Title", name: "title", widget: "string", required: false }
          - { label: "Meta Description", name: "description", widget: "text", required: false }
      - label: "Danh mục"
        name: "category"
        widget: "select"
        options:
          - { label: "Tin tức vườn", value: "tin-tuc" }
          - { label: "Kiến thức sức khỏe", value: "suc-khoe" }
          - { label: "Canh tác sinh thái", value: "canh-tac" }
          - { label: "Cộng đồng chủ vườn", value: "cong-dong" }
        default: "tin-tuc"

  # ─── GALLERY ───
  - name: "gallery"
    label: "🖼️ Thư viện ảnh vườn"
    folder: "_gallery"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Mô tả ảnh", name: "title", widget: "string", hint: "Ví dụ: Mận chín đỏ vụ Hè 2026" }
      - { label: "Ngày chụp", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - label: "Hình ảnh"
        name: "image"
        widget: "image"
        hint: "Upload ảnh vườn, cây, trái mận — khuyến nghị tỷ lệ 4:3 hoặc 1:1"
      - { label: "Chú thích (caption)", name: "caption", widget: "string", required: false, hint: "Hiện khi hover vào ảnh" }
      - label: "Danh mục ảnh"
        name: "category"
        widget: "select"
        options:
          - { label: "Vườn & Cây", value: "vuon" }
          - { label: "Trái mận", value: "trai" }
          - { label: "Thu hoạch", value: "thu-hoach" }
          - { label: "Hoạt động vườn", value: "hoat-dong" }
          - { label: "Dr. Hùng & Đội ngũ", value: "doi-ngu" }
        default: "vuon"
      - label: "Ghim lên đầu (hiện trước)"
        name: "featured"
        widget: "boolean"
        default: false
